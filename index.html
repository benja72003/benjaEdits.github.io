<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Editor | Visuales que Suenan</title>
    <style>
        /* --- CONFIGURACIÓN DE ESTILO --- */
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.05); /* Vidrio oscuro */
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #888888;
            --accent: #00ff88; /* Verde Matrix/Cyber */
            --accent-glow: rgba(0, 255, 136, 0.4);
            --gradient-1: #7928ca;
            --gradient-2: #ff0080;
        }

        /* --- BASE --- */
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(121, 40, 202, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 128, 0.15) 0%, transparent 40%);
        }

        /* --- BENTO GRID LAYOUT (RESPONSIVO MÓVIL PRIMERO) --- */
        .bento-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            gap: 20px;
            /* Por defecto: 1 columna para celulares (Vertical) */
            grid-template-columns: 1fr; 
            grid-auto-rows: auto;
        }

        /* Tablets (2 columnas) */
        @media (min-width: 768px) {
            .bento-container {
                grid-template-columns: repeat(2, 1fr);
                padding: 40px 20px;
            }
        }

        /* PC / Monitores (4 columnas - Horizontal) */
        @media (min-width: 1024px) {
            .bento-container {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* --- TARJETAS GLASSMORPHISM --- */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 25px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 40px -10px var(--accent-glow);
        }

        /* TAMAÑOS DE TARJETAS (BENTO) - Se activan solo en PC */
        @media (min-width: 1024px) {
            .col-2 { grid-column: span 2; }
            .col-3 { grid-column: span 3; }
            .col-4 { grid-column: span 4; }
            .row-2 { grid-row: span 2; }
        }

        /* --- TIPOGRAFÍA Y EFECTOS --- */
        h1 {
            /* Texto fluido: se achica en celular y crece en PC */
            font-size: clamp(2.5rem, 8vw, 3.5rem); 
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
        }

        h2 { font-size: 1.5rem; margin: 0 0 10px 0; font-weight: 500; }
        p { color: var(--text-dim); font-size: 0.95rem; line-height: 1.5; margin: 0; }
        
        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            font-size: 0.75rem;
            margin-bottom: 15px;
            border: 1px solid var(--card-border);
            color: var(--text-main);
        }

        /* --- EFECTO GLITCH EN HOVER --- */
        .glitch-text:hover {
            animation: glitch-anim 1.3s infinite;
            color: var(--accent);
            cursor: default;
        }

        @keyframes glitch-anim {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        /* --- VIDEOS RESPONSIVOS --- */
        .video-wrapper {
            width: 100%;
            /* El aspect-ratio evita que los videos se deformen y quita la necesidad de usar "height" fijos */
            aspect-ratio: 16 / 9; 
            border-radius: 16px;
            overflow: hidden;
            background: #000;
        }

        @media (min-width: 1024px) {
            .video-wrapper.main-video {
                height: 100%; /* Para que el Showreel ocupe toda la caja grande en PC */
            }
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* --- LINKS DE CONTACTO --- */
        .contact-links {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap; /* Si la pantalla es muy fina, los links bajan sin amontonarse */
            gap: 15px;
        }
        .contact-links a {
            color: white;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .contact-links a:hover {
            color: var(--accent); /* Se ponen verde neón al pasar el mouse */
        }
    </style>
</head>
<body>

    </div>

</body>
</html>
